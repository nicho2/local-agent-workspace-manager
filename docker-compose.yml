services:
  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    environment:
      LAWM_DATABASE_PATH: /data/sqlite/lawm.db
      LAWM_EXECUTION_ENABLED: "false"
      LAWM_WORKSPACE_ROOT: /workspace/examples/workspaces
      LAWM_WORKSPACE_ALLOWED_ROOTS: '["/workspace/examples/workspaces"]'
      LAWM_LOGS_ROOT: /data/logs
      LAWM_ARTIFACTS_ROOT: /data/artifacts
    volumes:
      - ./storage:/data
      - ./examples:/workspace/examples

  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8000
    depends_on:
      - api
